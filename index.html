let st={cu:null,teachers:[...INIT_TEACHERS],lessons:JSON.parse(JSON.stringify(INIT_LESSONS)),users:JSON.parse(JSON.stringify(INIT_USERS)),notifs:[...INIT_NOTIFS],nav:{stack:[],cur:null}};

function loadSt(){try{const s=localStorage.getItem(SKEY);if(s){const p=JSON.parse(s);st={...st,...p};}}catch(e){}}
function saveSt(){try{localStorage.setItem(SKEY,JSON.stringify({cu:st.cu,teachers:st.teachers,lessons:st.lessons,users:st.users,notifs:st.notifs}));}catch(e){}}
function resetSt(){localStorage.removeItem(SKEY);location.reload();}

// ============== UTILS ==============
function fmtD(d){const dt=new Date(d);return `${dt.getMonth()+1}月${dt.getDate()}日(${WD[dt.getDay()]})`}
function fmtDS(d){const dt=new Date(d);return `${dt.getMonth()+1}/${dt.getDate()}(${WD[dt.getDay()]})`}
function yen(n){return "¥"+n.toLocaleString()}
function enc(l){return l.students.filter(s=>!s.cancelRequested).length}
function user(){if(!st.cu)return null;if(st.cu.startsWith("t"))return st.teachers.find(t=>t.id===st.cu);return st.users.find(u=>u.id===st.cu)}
function isT(){return st.cu&&st.cu.startsWith("t")}
function esc(s){if(s==null)return "";return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c])}

let tt=null;
function toast(m,e){const t=document.getElementById("toast");t.textContent=m;t.className="tst show"+(e?" err":"");clearTimeout(tt);tt=setTimeout(()=>t.className="tst"+(e?" err":""),2800)}

function showM(c,onC){const r=document.getElementById("modal-root");r.innerHTML=`<div class="mo" id="mod"><div class="mc" onclick="event.stopPropagation()"><div class="mh"></div>${c}</div></div>`;const o=r.querySelector(".mo");setTimeout(()=>o.classList.add("show"),10);o.addEventListener("click",()=>closeM(onC))}
function closeM(cb){const r=document.getElementById("modal-root");const o=r.querySelector(".mo");if(o){o.classList.remove("show");setTimeout(()=>{r.innerHTML="";if(cb)cb()},280)}}

function nav(s,p){if(st.nav.cur)st.nav.stack.push(st.nav.cur);st.nav.cur={s,p:p||{}};saveSt();render();setTimeout(()=>{const e=document.querySelector(".screen");if(e)e.scrollTop=0},50)}
function navB(){if(st.nav.stack.length>0)st.nav.cur=st.nav.stack.pop();else st.nav.cur=null;saveSt();render()}
function navT(s){st.nav.stack=[];st.nav.cur={s,p:{}};saveSt();render()}

// ============== ACTIONS ==============
function book(lid){const u=user();const l=st.lessons.find(x=>x.id===lid);if(!u||!l)return;if(u.bookings.includes(lid)){toast("既に予約済み",1);return}u.bookings.push(lid);l.students.push({id:"s"+Date.now(),userId:u.id,name:u.name,paid:false,payMethod:null,cancelRequested:false});saveSt();closeM();toast("予約完了 ✓");render()}
function cancel(lid){const u=user();const l=st.lessons.find(x=>x.id===lid);if(!u||!l)return;u.bookings=u.bookings.filter(id=>id!==lid);const wasFull=enc(l)>=l.capacity;l.students=l.students.filter(s=>s.userId!==u.id);if(l.waitlist&&l.waitlist.length>0){const p=l.waitlist.shift();l.students.push({id:"s"+Date.now(),userId:p.userId,name:p.name,paid:false,payMethod:null,cancelRequested:false});const pu=st.users.find(x=>x.id===p.userId);if(pu){pu.waitlists=pu.waitlists.filter(id=>id!==lid);pu.bookings.push(lid);st.notifs.unshift({id:"n"+Date.now(),userId:pu.id,type:"promoted",teacherId:l.teacherId,lessonId:lid,text:"キャンセル待ちから繰り上がりました!",title:l.title,time:"たった今",read:false})}}else if(wasFull){st.users.forEach(x=>{if(x.following.includes(l.teacherId)){st.notifs.unshift({id:"n"+Date.now()+x.id,userId:x.id,type:"vacancy",teacherId:l.teacherId,lessonId:lid,text:"キャンセルが出て空きが!",title:l.title,time:"たった今",read:false})}})}saveSt();toast("予約をキャンセルしました");render()}
function joinWL(lid){const u=user();const l=st.lessons.find(x=>x.id===lid);if(!u||!l)return;if(u.waitlists.includes(lid)){toast("既に登録済み");return}u.waitlists.push(lid);if(!l.waitlist)l.waitlist=[];l.waitlist.push({userId:u.id,name:u.name});saveSt();closeM();toast("キャンセル待ち登録 ✓");render()}
function leaveWL(lid){const u=user();const l=st.lessons.find(x=>x.id===lid);if(!u||!l)return;u.waitlists=u.waitlists.filter(id=>id!==lid);l.waitlist=(l.waitlist||[]).filter(w=>w.userId!==u.id);saveSt();toast("キャンセル待ちを解除");render()}
function tglFollow(tid){const u=user();if(!u||isT())return;if(u.following.includes(tid)){u.following=u.following.filter(id=>id!==tid);toast("フォロー解除")}else{u.following.push(tid);toast("フォロー ✓")}saveSt();render()}
function tglPaid(lid,sid){const l=st.lessons.find(x=>x.id===lid);if(!l)return;const s=l.students.find(x=>x.id===sid);if(!s)return;s.paid=!s.paid;if(s.paid&&!s.payMethod)s.payMethod="現金";saveSt();render()}
function approveCR(lid,sid){const l=st.lessons.find(x=>x.id===lid);if(!l)return;l.students=l.students.filter(s=>s.id!==sid);saveSt();toast("キャンセルを承認");render()}
function delLesson(lid){if(!confirm("このレッスンを削除しますか?"))return;st.lessons=st.lessons.filter(l=>l.id!==lid);saveSt();toast("削除しました");navB()}
function createLesson(d){if(!d.title||!d.studio){toast("入力を確認してください",1);return false}const t=st.teachers.find(x=>x.id===st.cu);const nl={id:"l"+Date.now(),teacherId:t.id,title:d.title,genre:d.genre,level:d.level,date:d.date,time:d.time,duration:parseInt(d.duration),studio:d.studio,area:d.area||"",capacity:parseInt(d.capacity),price:parseInt(d.price),description:d.description||"",students:[],waitlist:[]};st.lessons.unshift(nl);st.users.forEach(u=>{if(u.following.includes(t.id))st.notifs.unshift({id:"n"+Date.now()+u.id,userId:u.id,type:"new_lesson",teacherId:t.id,lessonId:nl.id,text:"新しいレッスンを公開",title:nl.title,time:"たった今",read:false})});saveSt();return true}
function markNR(){const u=user();if(!u)return;st.notifs=st.notifs.map(n=>n.userId===u.id?{...n,read:true}:n);saveSt()}

function login(uid){st.cu=uid;st.nav={stack:[],cur:{s:uid.startsWith("t")?"dash":"home",p:{}}};saveSt();render()}
function logout(){st.cu=null;st.nav={stack:[],cur:null};closeM();saveSt();render()}

// ============== RENDER ROUTER ==============
function render(){
  const a=document.getElementById("app");
  const u=user();
  if(!u){a.innerHTML=rLogin();return}
  const c=st.nav.cur||{s:isT()?"dash":"home",p:{}};
  let h="";
  if(isT()){
    switch(c.s){
      case "dash":h=rTDash();break;
      case "myLessons":h=rTLessons();break;
      case "createL":h=rCreate();break;
      case "tLD":h=rTLD(c.p.lid);break;
      case "tProfile":h=rTProfile();break;
      case "notifs":h=rNotifs();break;
      case "settings":h=rSettings();break;
      default:h=rTDash();
    }
  }else{
    switch(c.s){
      case "home":h=rSHome();break;
      case "search":h=rSearch();break;
      case "teachers":h=rTeachers();break;
      case "tpub":h=rTPub(c.p.tid);break;
      case "myPage":h=rMyPage();break;
      case "sLD":h=rSLD(c.p.lid);break;
      case "notifs":h=rNotifs();break;
      case "settings":h=rSettings();break;
      default:h=rSHome();
    }
  }
  a.innerHTML=h;
}

// ============== LESSON CARD ==============
function rLC(l,mode){
  const t=st.teachers.find(x=>x.id===l.teacherId);
  const en=enc(l);
  const sl=l.capacity-en;
  const f=en>=l.capacity;
  const c=GC[l.genre]||"#888";
  const gc=GCL[l.genre]||"c-lvl";
  const u=user();
  const bk=!isT()&&u.bookings&&u.bookings.includes(l.id);
  const wt=!isT()&&u.waitlists&&u.waitlists.includes(l.id);
  const oc=mode==='t'?`nav('tLD',{lid:'${l.id}'})`:`nav('sLD',{lid:'${l.id}'})`;
  return `<div class="lc prs ${f?'full':''}" onclick="${oc}"><div class="lcs" style="background:${c}"></div><div class="lcb"><div class="lct"><div style="flex:1;min-width:0"><div class="lcg"><span class="chp ${gc}">${l.genre}</span><span class="chp c-lvl">${l.level}</span>${bk?'<span class="chp c-bk">✓予約済</span>':''}${wt?'<span class="chp c-wt">⏳待機中</span>':''}</div><div class="lcti">${esc(l.title)}</div>${mode==='s'&&t?`<div class="lcte"><div class="lcta" style="background:${t.color}">${t.avatar}</div><span style="font-size:10px;color:#888">${esc(t.name)}</span></div>`:''}<div class="lcm">📅 ${fmtDS(l.date)} ${l.time}<br>📍 <span style="color:#4CC9F0">${esc(l.studio)}</span></div></div><div class="lcr"><div class="lcp">${yen(l.price)}</div>${f?'<div class="chp c-fl">満員</div>':`<div style="font-size:10px;color:#00B894;font-weight:700">残り${sl}席</div>`}</div></div><div class="lcpr"><div class="lcpf" style="width:${(en/l.capacity)*100}%;background:${f?'#FF4D6D':en/l.capacity>0.7?'#FDCB6E':'#00B894'}"></div></div></div></div>`;
}

// ============== TEACHER: DASHBOARD ==============
function rTDash(){
  const t=user();
  const myL=st.lessons.filter(l=>l.teacherId===t.id);
  const up=myL.filter(l=>l.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date));
  const next=up[0];
  const tot=myL.reduce((s,l)=>s+enc(l),0);
  const rev=myL.reduce((s,l)=>s+l.students.filter(x=>x.paid&&!x.cancelRequested).reduce((a)=>a+l.price,0),0);
  const un=myL.reduce((s,l)=>s+l.students.filter(x=>!x.paid&&!x.cancelRequested).length,0);
  const cr=myL.reduce((s,l)=>s+l.students.filter(x=>x.cancelRequested).length,0);
  const fol=st.users.filter(u=>u.following.includes(t.id)).length;
  return `${rHdr('t')}<div class="screen">

  <div style="padding:14px 16px"><div class="sg"><div class="sm"><div class="sv" style="color:#00B894">${myL.length}</div><div class="sl">レッスン数</div></div><div class="sm"><div class="sv" style="color:#FDCB6E">${tot}</div><div class="sl">予約数</div></div><div class="sm"><div class="sv" style="color:#FF6B35">${yen(rev)}</div><div class="sl">入金済</div></div></div>
  ${cr>0?`<div class="card prs" style="border-color:rgba(255,77,109,0.3);background:rgba(255,77,109,0.06)" onclick="navT('myLessons')"><div style="display:flex;align-items:center;gap:10px"><div style="font-size:22px">⚠️</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#FF4D6D">${cr}件のキャンセル申請</div><div style="font-size:10px;color:#888;margin-top:1px">対応してください</div></div><span style="color:#FF4D6D">›</span></div></div>`:''}
  ${un>0?`<div class="card prs" style="border-color:rgba(253,203,110,0.3);background:rgba(253,203,110,0.06)" onclick="navT('myLessons')"><div style="display:flex;align-items:center;gap:10px"><div style="font-size:22px">💴</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#FDCB6E">未入金 ${un}件</div><div style="font-size:10px;color:#888;margin-top:1px">タップして管理</div></div><span style="color:#FDCB6E">›</span></div></div>`:''}
  ${next?`<div class="sec">次のレッスン</div>${rLC(next,'t')}`:`<div class="es" style="padding:30px 20px"><div class="ei">📅</div><div class="et">予定されているレッスンはありません</div></div>`}
  ${up.length>1?`<div class="sec">今後のレッスン (${up.length}件)</div>${up.slice(1,4).map(l=>rLC(l,'t')).join('')}${up.length>4?`<button class="btn bs prs" onclick="navT('myLessons')">すべてのレッスンを見る (${up.length}件)</button>`:''}`:''}
  </div></div><button class="fab prs" onclick="nav('createL')">＋</button>${rBN('dash')}`;
}

// ============== TEACHER: MY LESSONS ==============
function rTLessons(){
  const t=user();
  const p=st.nav.cur.p||{};
  const tab=p.tab||"upcoming";
  let ls=st.lessons.filter(l=>l.teacherId===t.id);
  if(tab==="upcoming")ls=ls.filter(l=>l.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date));

  return `${rHdr('t')}<div class="screen">

  <div class="lst" style="padding-top:12px">${ls.length===0?`<div class="es"><div class="ei">📅</div><div class="et">${tab==='upcoming'?'今後のレッスンはありません':'過去のレッスンはありません'}</div></div>`:ls.map(l=>rLC(l,'t')).join('')}</div>

// ============== TEACHER: LESSON DETAIL ==============
function rTLD(lid){
  const l=st.lessons.find(x=>x.id===lid);
  if(!l)return rTDash();
  const c=GC[l.genre]||"#888";
  const gc=GCL[l.genre]||"c-lvl";
  const en=enc(l);
  const paid=l.students.filter(s=>s.paid&&!s.cancelRequested);
  const unpaid=l.students.filter(s=>!s.paid&&!s.cancelRequested);
  const cancelReqs=l.students.filter(s=>s.cancelRequested);

let filters={kw:"",areas:[],genres:[],levels:[],avail:false};
function tglFilter(type,val){const a=filters[type];if(a.includes(val))filters[type]=a.filter(x=>x!==val);else a.push(val);render()}
function clearFilters(){filters={kw:"",areas:[],genres:[],levels:[],avail:false};render()}
function applyF(){let r=st.lessons.filter(l=>l.date>=TODAY);if(filters.kw){const k=filters.kw.toLowerCase();r=r.filter(l=>l.title.toLowerCase().includes(k)||(st.teachers.find(t=>t.id===l.teacherId)||{}).name.toLowerCase().includes(k))}if(filters.areas.length>0)r=r.filter(l=>filters.areas.includes(l.area));if(filters.genres.length>0)r=r.filter(l=>filters.genres.includes(l.genre));if(filters.levels.length>0)r=r.filter(l=>filters.levels.includes(l.level));if(filters.avail)r=r.filter(l=>enc(l)<l.capacity);return r.sort((a,b)=>a.date.localeCompare(b.date))}
function getFC(){let c=0;if(filters.kw)c++;c+=filters.areas.length+filters.genres.length+filters.levels.length;if(filters.avail)c++;return c}

function rSearch(){
  const r=applyF();
  const fc=getFC();
  return `${rHdr('s')}<div class="screen"><div style="padding:14px 16px 8px"><div class="h2">レッスンを探す</div><div class="sub">${r.length}件のレッスン</div></div>
  <div class="sbar"><span style="font-size:14px;color:#888">🔍</span><input placeholder="先生名・レッスン名で検索" value="${esc(filters.kw)}" oninput="filters.kw=this.value;render()"></div>
  <div style="padding:0 12px 6px"><div style="font-size:9px;color:#4CC9F0;font-weight:700;letter-spacing:1px;margin-bottom:5px">📍 エリア</div></div>
  <div class="fc">${AREAS.map(a=>`<div class="fch ${filters.areas.includes(a)?'on':''}" onclick="tglFilter('areas','${a}')">${a}</div>`).join('')}</div>
  <div style="padding:0 12px 6px"><div style="font-size:9px;color:#FF6B35;font-weight:700;letter-spacing:1px;margin-bottom:5px">🎵 ジャンル</div></div>
  <div class="fc">${GENRES.map(g=>`<div class="fch ${filters.genres.includes(g)?'on':''}" onclick="tglFilter('genres','${g}')">${g}</div>`).join('')}</div>
  <div style="padding:0 12px 6px"><div style="font-size:9px;color:#A29BFE;font-weight:700;letter-spacing:1px;margin-bottom:5px">📊 レベル</div></div>
  <div class="fc">${LEVELS.map(l=>`<div class="fch ${filters.levels.includes(l)?'on':''}" onclick="tglFilter('levels','${l}')">${l}</div>`).join('')}</div>
  <div style="padding:0 12px 10px"><div class="card prs" style="${filters.avail?'background:rgba(0,184,148,0.08);border-color:rgba(0,184,148,0.3)':''};margin:0;padding:10px 12px;display:flex;align-items:center;gap:10px" onclick="filters.avail=!filters.avail;render()"><div class="cb ${filters.avail?'on':''}">${filters.avail?'✓':''}</div><div style="flex:1;font-size:12px;font-weight:600;${filters.avail?'color:#00B894':''}">空きありのみ表示</div></div></div>
  ${fc>0?`<div style="padding:0 16px 10px"><button class="btn bs prs" onclick="clearFilters()" style="padding:8px;font-size:11px">🔄 フィルターをクリア (${fc})</button></div>`:''}
  <div class="lst">${r.length===0?`<div class="es"><div class="ei">🔍</div><div class="et">該当するレッスンがありません</div><button class="btn bs prs" onclick="clearFilters()" style="margin-top:12px;max-width:200px">フィルターをクリア</button></div>`:r.map(l=>rLC(l,'s')).join('')}</div>
  </div>${rBN('search')}`;
}

  <div class="dht">${esc(l.title)}</div>
  <div class="dhp">${yen(l.price)}</div></div>

  <div class="ig"><div class="ii"><div style="font-size:14px">📅</div><div><div class="iil">日程</div><div class="iiv">${fmtD(l.date)}<br>${l.time}</div></div></div><div class="ii"><div style="font-size:14px">⏱</div><div><div class="iil">時間</div><div class="iiv">${l.duration}分</div></div></div><div class="ii tp prs" onclick="openMap('${esc(l.studio)}')"><div style="font-size:14px">📍</div><div><div class="iil">スタジオ →</div><div class="iiv">${esc(l.studio)}</div></div></div><div class="ii"><div style="font-size:14px">👥</div><div><div class="iil">${f?'満員':'空き'}</div><div class="iiv">${f?'満員':'残り'+sl+'席'}</div></div></div></div>

  ${l.description?`<div style="padding:0 16px 14px"><div class="lbl" style="margin-bottom:5px">レッスン内容</div><p style="font-size:12px;color:#bbb;line-height:1.6">${esc(l.description)}</p></div>`:''}

  ${wt?`<div style="padding:0 16px 14px"><div class="card" style="background:rgba(108,92,231,0.08);border-color:rgba(108,92,231,0.25);text-align:center"><div style="font-size:11px;color:#A29BFE;font-weight:700;margin-bottom:4px">⏳ キャンセル待ち中</div><div style="font-size:22px;font-weight:900;color:#A29BFE">${wlPos}番目</div><div style="font-size:10px;color:#888;margin-top:3px">空きが出たら通知が届きます</div></div></div>`:''}

  <div style="padding:0 16px 20px">
  ${bk?`<button class="btn bd prs" onclick="if(confirm('予約をキャンセル?'))cancel('${l.id}')">予約をキャンセルする</button>`:wt?`<button class="btn bd prs" onclick="if(confirm('キャンセル待ちを解除?'))leaveWL('${l.id}')">キャンセル待ちを解除する</button>`:f?`<button class="btn bp prs" onclick="confirmWL('${l.id}')">⏳ キャンセル待ちに登録</button><div style="text-align:center;font-size:10px;color:#888;margin-top:8px">空きが出たら通知が届きます</div>`:`<button class="btn bp prs" onclick="confirmBook('${l.id}')">このレッスンを予約する</button>`}
  </div>
  </div>`;
}

function confirmBook(lid){const l=st.lessons.find(x=>x.id===lid);if(!l)return;const t=st.teachers.find(x=>x.id===l.teacherId)||{};showM(`<button class="mcl" onclick="closeM()">✕</button><div class="mt">予約内容を確認</div><div class="card" style="margin-bottom:14px;background:rgba(255,107,53,0.06);border-color:rgba(255,107,53,0.2)"><div style="font-size:14px;font-weight:800;margin-bottom:6px">${esc(l.title)}</div><div style="font-size:11px;color:#aaa;line-height:1.6">👨‍🏫 ${esc(t.name)}<br>📅 ${fmtD(l.date)} ${l.time} (${l.duration}分)<br>📍 ${esc(l.studio)}<br>💴 ${yen(l.price)}</div></div><div style="font-size:11px;color:#888;line-height:1.5;background:rgba(255,255,255,0.03);padding:8px 10px;border-radius:6px;margin-bottom:14px">※ 当日現地でお支払いください。キャンセルは前日まで可能です。</div><button class="btn bp prs" onclick="book('${lid}')">予約を確定する</button><button class="btn bs prs" onclick="closeM()" style="margin-top:8px">キャンセル</button>`)}

function confirmWL(lid){const l=st.lessons.find(x=>x.id===lid);if(!l)return;const pos=(l.waitlist||[]).length+1;showM(`<button class="mcl" onclick="closeM()">✕</button><div class="mt">キャンセル待ちに登録</div><div class="card" style="margin-bottom:14px;background:rgba(108,92,231,0.06);border-color:rgba(108,92,231,0.25);text-align:center"><div style="font-size:11px;color:#A29BFE;font-weight:700;margin-bottom:4px">登録すると</div><div style="font-size:22px;font-weight:900;color:#A29BFE">${pos}番目</div><div style="font-size:10px;color:#888;margin-top:3px">の待機者になります</div></div><div style="font-size:11px;color:#bbb;line-height:1.6;padding:0 4px;margin-bottom:14px">・キャンセルが出たら自動で繰り上がります<br>・繰り上がり時にプッシュ通知が届きます<br>・繰り上がり後のキャンセルはできません</div><button class="btn bp prs" onclick="joinWL('${lid}')">キャンセル待ちに登録</button><button class="btn bs prs" onclick="closeM()" style="margin-top:8px">キャンセル</button>`)}

// ============== STUDENT: MY PAGE ==============
function rMyPage(){
  const u=user();
  const p=st.nav.cur.p||{};
  const tab=p.tab||"upcoming";
  let ls=[];
  if(tab==="upcoming")ls=u.bookings.map(id=>st.lessons.find(l=>l.id===id)).filter(l=>l&&l.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date));
  else if(tab==="past")ls=u.bookings.map(id=>st.lessons.find(l=>l.id===id)).filter(l=>l&&l.date<TODAY).sort((a,b)=>b.date.localeCompare(a.date));
  else ls=u.waitlists.map(id=>st.lessons.find(l=>l.id===id)).filter(Boolean);
  return `${rHdr('s')}<div class="screen"><div style="padding:14px 16px 8px"><div class="h1">${esc(u.name)}</div><div class="sub">予約 ${u.bookings.length}件 · 待機 ${u.waitlists.length}件 · フォロー ${u.following.length}名</div></div>
  <div class="tb"><button class="tbi ${tab==='upcoming'?'on':''}" onclick="st.nav.cur.p={tab:'upcoming'};saveSt();render()">今後 (${u.bookings.map(id=>st.lessons.find(l=>l.id===id)).filter(l=>l&&l.date>=TODAY).length})</button><button class="tbi ${tab==='waiting'?'on':''}" onclick="st.nav.cur.p={tab:'waiting'};saveSt();render()">待機中 (${u.waitlists.length})</button><button class="tbi ${tab==='past'?'on':''}" onclick="st.nav.cur.p={tab:'past'};saveSt();render()">過去</button></div>
  <div class="lst" style="padding-top:12px">${ls.length===0?`<div class="es"><div class="ei">${tab==='waiting'?'⏳':'📅'}</div><div class="et">${tab==='upcoming'?'今後の予約はありません':tab==='waiting'?'キャンセル待ち登録はありません':'過去の予約はありません'}</div>${tab!=='past'?'<button class="btn bs prs" onclick="navT(\'search\')" style="margin-top:12px;max-width:200px">レッスンを探す</button>':''}</div>`:ls.map(l=>rLC(l,'s')).join('')}</div></div>${rBN('myPage')}`;
}

// ============== NOTIFICATIONS ==============
function rNotifs(){
  const u=user();
  const ns=st.notifs.filter(n=>n.userId===u.id);
  setTimeout(()=>markNR(),500);
  return `<div class="dh"><button class="back prs" onclick="navB()">← 戻る</button><div class="dt">通知</div></div><div class="screen nb"><div class="lst" style="padding-top:12px">
  ${ns.length===0?`<div class="es"><div class="ei">🔔</div><div class="et">通知はありません</div></div>`:ns.map(n=>{const t=st.teachers.find(x=>x.id===n.teacherId);const ic=n.type==='vacancy'?'🎉':n.type==='promoted'?'🚀':n.type==='waitlist_confirmed'?'⏳':'🆕';return `<div class="ni ${n.read?'':'un'} prs" onclick="${n.lessonId?`nav('${isT()?'tLD':'sLD'}',{lid:'${n.lessonId}'})`:''}"><div class="na" style="background:${t?t.color:'#888'}">${ic}</div><div class="nc"><div class="nt">${t?esc(t.name):'システム'}</div><div class="nx">${esc(n.text)}</div><div class="nl">${esc(n.title)}</div><div class="nm">${n.time}</div></div>${!n.read?'<div class="nd"></div>':''}</div>`}).join('')}
  </div></div>`;
}

  <div class="card" style="margin:14px 16px"><div style="display:flex;align-items:center;gap:10px"><div style="width:40px;height:40px;border-radius:50%;background:${isT()?u.color:'linear-gradient(135deg,#FF6B35,#FDCB6E)'};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800">${isT()?u.avatar:u.name[0]}</div><div style="flex:1"><div style="font-weight:700">${esc(u.name)}</div><div style="font-size:10px;color:#888">${isT()?'先生':'生徒'}アカウント</div></div></div></div>

  <div class="sec">アカウント</div>
  <div style="padding:0 16px">
  <button class="card prs" style="width:100%;display:flex;justify-content:space-between;align-items:center;text-align:left" onclick="toast('実装予定')"><span>プロフィール編集</span><span style="color:#666">›</span></button>
  <button class="card prs" style="width:100%;display:flex;justify-content:space-between;align-items:center;text-align:left" onclick="toast('実装予定')"><span>通知設定</span><span style="color:#666">›</span></button>
  </div>

  <div class="sec">サポート</div>
  <div style="padding:0 16px">
  <button class="card prs" style="width:100%;display:flex;justify-content:space-between;align-items:center;text-align:left" onclick="toast('実装予定')"><span>ヘルプ</span><span style="color:#666">›</span></button>
  <button class="card prs" style="width:100%;display:flex;justify-content:space-between;align-items:center;text-align:left" onclick="toast('実装予定')"><span>お問い合わせ</span><span style="color:#666">›</span></button>
  <button class="card prs" style="width:100%;display:flex;justify-content:space-between;align-items:center;text-align:left" onclick="toast('実装予定')"><span>利用規約</span><span style="color:#666">›</span></button>
  </div>

  <div class="sec">デモ操作</div>
  <div style="padding:0 16px"><button class="card prs" style="width:100%;display:flex;justify-content:space-between;align-items:center;text-align:left;color:#FDCB6E" onclick="if(confirm('デモデータをリセット?'))resetSt()"><span>🔄 デモデータをリセット</span><span style="color:#666">›</span></button></div>

  <div style="padding:20px 16px"><button class="btn bd prs" onclick="logout()">ログアウト</button></div>
  </div>`;
}

// ============== INIT ==============
loadSt();
render();
</script>
